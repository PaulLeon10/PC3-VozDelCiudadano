<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Plataforma de Iniciativas Ciudadanas - Voz del Ciudadano</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <link rel="stylesheet" href="css/styles.css">
</head>
<body class="bg-light">

    <nav class="navbar navbar-expand-lg navbar-dark bg-dark shadow-sm mb-4">
    <div class="container">
        <a class="navbar-brand fw-bold text-white" href="#">
            Voz del Ciudadano
        </a>
    </div>
    </nav>

    <div class="container mb-5">
        
        <ul class="nav nav-tabs mb-4 border-bottom-0" id="mainTabs" role="tablist">
            <li class="nav-item">
                <button class="nav-link active fw-bold" id="btn-colectivo" onclick="cambiarPestaña('colectivo')">Colectivo Civil (CU-01)</button>
            </li>
            <li class="nav-item">
                <button class="nav-link fw-bold" id="btn-ciudadano" onclick="cambiarPestaña('ciudadano')">Portal Ciudadano (CU-02)</button>
            </li>
            <li class="nav-item">
                <button class="nav-link fw-bold" id="btn-sistema" onclick="cambiarPestaña('sistema')">Auditoría del Sistema (CU-03/04)</button>
            </li>
        </ul>

        <!-- SECCIÓN 1: COLECTIVO CIVIL (CU-01) -->

        <div id="vista-colectivo" class="card shadow border-0 p-4 mb-4">
            <h4 class="card-title text-primary border-bottom pb-2 mb-3">Registrar Propuesta Normativa</h4>
            <form id="form-propuesta">
                <div class="mb-3">
                    <label for="titulo" class="form-label fw-bold">Título de la Iniciativa</label>
                    <input type="text" id="titulo" class="form-control form-control-lg" placeholder="Ej. Ley de Protección de Áreas Verdes Urbanas" required>
                </div>
                <div class="mb-3">
                    <label for="textoBase" class="form-label fw-bold">Texto Legal Base y Recursos de Soporte</label>
                    <textarea id="textoBase" class="form-control" rows="8" placeholder="Ingrese el texto del proyecto de ley junto con los enlaces de los documentos de soporte" required></textarea>
                </div>
                <div class="d-flex justify-content-end">
                    <button type="submit" class="btn btn-primary px-5 fw-semibold">Publicar Iniciativa</button>
                </div>
            </form>
        </div>

        <!-- SECCIÓN 2: PORTAL CIUDADANO (CU-02) -->

        <div id="vista-ciudadano" class="card shadow border-0 p-4 mb-4 d-none">
            <h4 class="card-title text-success border-bottom pb-2 mb-3">Catálogo de Iniciativas Disponibles</h4>
            
            <div class="mb-4 bg-light p-3 rounded">
                <label for="select-propuestas" class="form-label fw-bold">Seleccionar Propuesta Normativa</label>
                <select id="select-propuestas" class="form-select form-select-lg" onchange="actualizarDetallePropuesta()">
                    <option value="">Seleccione una propuesta de la lista</option>
                </select>
            </div>

            <div id="zona-firma" class="border p-4 rounded bg-white shadow-sm d-none">
                <div class="d-flex flex-column flex-md-row justify-content-between align-items-md-center mb-3">
                    <h5 id="detalle-titulo" class="text-dark fw-bold mb-2 mb-md-0"></h5>
                    <div>
                        <span class="text-muted me-1">Estado:</span>
                        <span id="detalle-estado" class="badge bg-success"></span>
                        <span class="text-muted ms-3 me-1">Adhesiones:</span>
                        <span id="detalle-firmas" class="badge bg-dark fs-6"></span>
                    </div>
                </div>
                <hr>
                <form id="form-firma">
                    <div class="row g-3 mb-4">
                        <div class="col-md-4">
                            <label for="ciudadanoId" class="form-label fw-bold">ID Ciudadano (DNI / Pasaporte)</label>
                            <input type="number" id="ciudadanoId" class="form-control" placeholder="Documento de Identidad" required>
                        </div>
                        <div class="col-md-8">
                            <label for="comentario" class="form-label fw-bold">Observación o Enmienda Sugerida (Composite Leaf)</label>
                            <input type="text" id="comentario" class="form-control" placeholder="Opcional: Ingrese un comentario para anexar al expediente">
                        </div>
                    </div>
                    <div class="d-flex justify-content-end">
                        <button type="submit" class="btn btn-success px-5 fw-semibold">Registrar Firma y Respaldo</button>
                    </div>
                </form>
            </div>
        </div>

        <!-- SECCIÓN 3: AUDITORÍA Y SISTEMA (CU-03 y CU-04) -->

        <div id="vista-sistema" class="card shadow border-0 p-4 mb-4 d-none">
            <h4 class="card-title text-dark border-bottom pb-2 mb-3">Panel de Control de Auditoría (Facade)</h4>
            
            <div class="table-responsive rounded shadow-sm">
                <table class="table table-hover align-middle mb-0">
                    <thead class="table-dark">
                        <tr>
                            <th style="width: 8%">ID</th>
                            <th style="width: 32%">Iniciativa</th>
                            <th style="width: 10%" class="text-center">Firmas</th>
                            <th style="width: 15%">Estado</th>
                            <th style="width: 20%">Sello Criptográfico (SHA-256)</th>
                            <th style="width: 15%" class="text-center">Acciones</th>
                        </tr>
                    </thead>
                    <tbody id="tabla-sistema" class="bg-white">
                        </tbody>
                </table>
            </div>
        </div>
    </div>

    <!-- NOTIFICACIONES DEL SISTEMA -->

    <div class="position-fixed bottom-0 end-0 p-3" style="z-index: 1050">
        <div id="liveToast" class="toast align-items-center text-white border-0" role="alert" aria-live="assertive" aria-atomic="true">
            <div class="d-flex">
                <div class="toast-body fw-medium" id="toast-mensaje"></div>
                <button type="button" class="btn-close btn-close-white me-2 m-auto" data-bs-dismiss="toast" aria-label="Close"></button>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/app.js"></script>
    <script>
        // Asegura que las propuestas se carguen inmediatamente al abrir el sitio
        document.addEventListener("DOMContentLoaded", () => {
            cargarPropuestas();
        });
    </script>
</body>
</html>
